<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Transparency</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  
    .container {
      text-align: center;
    }
  
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top: 3px solid #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
  
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
  
      100% {
        transform: rotate(360deg);
      }
    }
  
    p {
      color: #666;
      font-size: 0.95rem;
    }
  
    a {
      color: #333;
      text-decoration: underline;
    }
  
    a:hover {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>页面加载中...</p>
    <p>若未自动跳转，请<a href="./generator/index.html">点击这里</a></p>
  </div>
  
  <script>
    window.location.href = './generator/index.html';
  </script>
</body>
</html>
